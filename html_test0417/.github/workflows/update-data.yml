name: Update Market Data

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 02:00 UTC (10:00 AM Beijing Time)
  workflow_dispatch:      # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare pandas

      - name: Update stock list
        run: python scripts/build-stock-list.py

      - name: Update fund list
        run: python scripts/build-fund-list.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/js/all-stocks.js public/js/all-funds.js public/js/all-funds-full.json
          git diff --cached --quiet || (git commit -m "chore: auto-update stock & fund data [$(date +%Y-%m-%d)]" && git push)
